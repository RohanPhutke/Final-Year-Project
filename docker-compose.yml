services:
  kafka:
    image: bitnamilegacy/kafka:latest
    restart: always
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_CFG_MESSAGE_MAX_BYTES=10485760
      - KAFKA_CFG_REPLICA_FETCH_MAX_BYTES=10485760

  spark-master:
    image: bitnamilegacy/spark:3.5.0
    environment:
      - SPARK_MODE=master
    ports:
      - "7077:7077"
      - "8080:8080"

  spark-worker:
    image: bitnamilegacy/spark:3.5.0
    user: root
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
    volumes:
      - ./model:/app/model
      - ./output:/app/output
    depends_on:
      - spark-master

  # ── Step 1: Edge Client (Rohan) ─────────────────────────────────
  # Reads real .mat sensor data and streams to Kafka
  edge_client:
    build:
      context: .
      dockerfile: docker/edge_client/Dockerfile
    depends_on:
      - kafka
    volumes:
      - ./dataset:/app/dataset:ro
    environment:
      - KAFKA_BROKER=kafka:9092
      - KAFKA_TOPIC=imu-data
      - DATASET_DIR=/app/dataset
      - SEND_INTERVAL=1
    restart: on-failure

  # ── Step 1: Spark Inference Job (Rohan) ─────────────────────────
  # Runs trained LSTM model on sensor windows, writes predictions to Kafka
  spark-job:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
    depends_on:
      - kafka
      - spark-master
    volumes:
      - ./model:/app/model:ro
      - ./output:/app/output
    environment:
      - KAFKA_BROKER=kafka:9092
      - INPUT_TOPIC=imu-data
      - OUTPUT_TOPIC=predictions
      - OUTPUT_PATH=/app/output/stream_results
      - MODEL_PATH=/app/model/model.pth
    restart: on-failure

  # ── Step 2: Dashboard Server (Agatsya + Bridge) ─────────────────
  # Flask backend serving the monitoring UI with RAG triage support
  dashboard:
    build:
      context: .
      dockerfile: docker/dashboard/Dockerfile
    ports:
      - "5050:5050"
    volumes:
      - ./dashboard:/app/dashboard
    environment:
      - FLASK_ENV=production
    restart: on-failure

  # ── Bridge: Kafka → Dashboard (Connection Layer) ────────────────
  # Consumes Spark predictions from Kafka, runs severity analysis + RAG,
  # and pushes real-time alerts to the dashboard API
  kafka-bridge:
    build:
      context: .
      dockerfile: docker/bridge/Dockerfile
    depends_on:
      - kafka
      - dashboard
    environment:
      - KAFKA_BROKER=kafka:9092
      - PREDICTIONS_TOPIC=predictions
      - DASHBOARD_URL=http://dashboard:5050
    restart: on-failure

networks:
  default:
    driver: bridge