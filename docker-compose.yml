services:
  kafka:
    image: bitnamilegacy/kafka:latest
    restart: always
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - ALLOW_PLAINTEXT_LISTENER=yes

  spark-master:
    image: bitnamilegacy/spark:3.5.0
    environment:
      - SPARK_MODE=master
    ports:
      - "7077:7077"
      - "8080:8080"

  spark-worker:
    image: bitnamilegacy/spark:3.5.0
    user: root
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
    volumes:
      - ./model:/app/model
      - ./output:/app/output
    depends_on:
      - spark-master

  edge_client:
    build:
      context: .
      dockerfile: docker/edge_client/Dockerfile
    depends_on:
      - kafka
    environment:
      - KAFKA_BROKER=kafka:9092
    restart: on-failure
    networks:
      - default

  spark-job:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
    depends_on:
      - kafka
      - spark-master
    volumes:
      - ./model:/app/model
      - ./output:/app/output
    environment:
      - KAFKA_BROKER=kafka:9092
      - OUTPUT_PATH=/app/output/stream_results
    restart: on-failure
    networks:
      - default

networks:
  default:
    driver: bridge